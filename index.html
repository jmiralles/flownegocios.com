<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowNegocios — Automatización de servicios y flujos de trabajo</title>
    <style>
        :root {
            --color-bg: #f6f8fb;
            --color-surface: #ffffff;
            --color-text: #1f2937;
            --color-muted: #6b7280;
            --color-accent: #2563eb;
            --color-accent-hover: #1d4ed8;
            --color-accent-soft: #dbeafe;
            --color-border: #e5e7eb;
            --radius: 14px;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
            font-size: 17px;
            line-height: 1.7;
            color: var(--color-text);
            background:
                radial-gradient(1200px 600px at 10% -10%, var(--color-accent-soft), transparent 60%),
                radial-gradient(800px 400px at 110% 10%, #ede9fe, transparent 60%),
                var(--color-bg);
            padding: 48px 20px;
        }

        main {
            max-width: 640px;
            width: 100%;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: clamp(28px, 5vw, 56px);
            text-align: center;
        }

        .eyebrow {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-accent);
            background: var(--color-accent-soft);
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(1.8rem, 3vw + 1rem, 2.6rem);
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0 0 16px;
            color: #0f172a;
        }

        p.lead {
            font-size: 1.1rem;
            color: #374151;
            margin: 0 auto 32px;
            max-width: 52ch;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            background: var(--color-accent);
            border-radius: 999px;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .cta:hover,
        .cta:focus-visible {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
            outline: none;
        }

        .cta::after {
            content: "→";
            transition: transform 0.2s ease;
        }

        .cta:hover::after,
        .cta:focus-visible::after {
            transform: translateX(3px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #0b1220;
                --color-surface: #111a2e;
                --color-text: #e5e7eb;
                --color-muted: #9ca3af;
                --color-accent: #60a5fa;
                --color-accent-hover: #3b82f6;
                --color-accent-soft: rgba(96, 165, 250, 0.18);
                --color-border: #1f2a44;
                --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            }

            h1 {
                color: #f8fafc;
            }

            p.lead {
                color: #cbd5e1;
            }

            .cta {
                color: #0b1220;
            }
        }
    </style>
</head>
<body>
    <main>
        <span class="eyebrow">FlowNegocios</span>
        <h1>Automatización de servicios y flujos de trabajo</h1>
        <p class="lead">Diseñamos e implementamos automatizaciones que conectan tus herramientas y eliminan tareas repetitivas, para que tu equipo se enfoque en lo que realmente importa.</p>
        <a class="cta" href="privacy-policy.html">Política de Privacidad</a>
    </main>
</body>
</html>
